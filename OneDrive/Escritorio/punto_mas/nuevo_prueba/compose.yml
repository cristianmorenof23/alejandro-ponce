services:

  app:
    image: registry.gitlab.com/bigpear.adm/punto_mas
    environment:
      - DEBUG=${DEBUG}
      - DB_URL=${DB_URL}
    volumes:
      - ./static:/root/static
    expose:
      - 8000
    depends_on:
      - db

  db:
    image: postgres
    volumes:
      - ./scripts:/root/bin
    expose:
      - 5432
  proxy:
    image: nginx:alpine
    volumes:
      - ./etc/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./etc/nginx/html:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - punto_mas
