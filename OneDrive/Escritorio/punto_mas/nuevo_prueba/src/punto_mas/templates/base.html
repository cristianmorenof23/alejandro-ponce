{% load static django_vite %}
<!DOCTYPE html>
<!--[if lt IE 7]><html class="lt-ie9 lt-ie8 lt-ie7" lang="es" dir="ltr"><![endif]-->
<!--[if IE 7]><html class="lt-ie9 lt-ie8" lang="es" dir="ltr"><![endif]-->
<!--[if IE 8]><html class="lt-ie9" lang="es" dir="ltr"><![endif]-->
<!--[if gt IE 8]><!-->
<html lang="es"
        dir="ltr"
        prefix="og: http://ogp.me/ns# article: http://ogp.me/ns/article# book: http://ogp.me/ns/book# profile: http://ogp.me/ns/profile# video: http://ogp.me/ns/video# product: http://ogp.me/ns/product# content: http://purl.org/rss/1.0/modules/content/ dc: http://purl.org/dc/terms/ foaf: http://xmlns.com/foaf/0.1/ rdfs: http://www.w3.org/2000/01/rdf-schema# sioc: http://rdfs.org/sioc/ns# sioct: http://rdfs.org/sioc/types# skos: http://www.w3.org/2004/02/skos/core# xsd: http://www.w3.org/2001/XMLSchema#"
><!--<![endif]-->
<head>
    <meta charset="utf-8" />
    <link
        rel="alternate"
        type="application/rss+xml"
        title="Front page feed"
        href="{{site_url}}/rss.xml"
    />
    <link
        rel="shortcut icon"
        href="{% static 'img/favicon.ico' %}"
        type="image/vnd.microsoft.icon"
    />
    <meta name="generator" content="django + vite" />

    <link rel="canonical" href="{{site_url}}/" />
    <link rel="shortlink" href="{{site_url}}/" />
    <title>punto_mas - {{ title|default:"Monitoreo Temporal Satelital" }} </title>
    {% vite_hmr_client %}
    <link rel="stylesheet" href="{% vite_asset_url 'sass/main.scss' %}">
    <meta property="og:site_name" content="Monitoreo Temporal Satelital" />
    <meta property="og:url" content="{{ request.build_absolute_uri }}" />
    <meta property="og:type" content="article" />
    <meta property="og:title" content="punto_mas - {{ title }}" />


</head>

<body class="body punto_mas">
    <div id="page">
        {% include "header.html" %}
        <div id="main-viewport">
        {% block container %}
        {% endblock container %}
        </div>
        {% include 'footer.html' %}
    </div>
    <input type="hidden" id="csrf-token" value="{{csrf_token}}" />
    {% block extra_js %}
    {% endblock extra_js %}

</body>
</html>
