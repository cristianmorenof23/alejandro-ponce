services:
  app:
    build:
      context: .
      target: dev
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=["*"]
    ports:
      - "8000:8000"
    volumes:
      - .:/root/src
      - ./static:/root/src/static
      - ./.env:/root/src/.env
      - ./dist:/root/src/dist
      - /root/src/node_modules

  db:
    expose:
      - 5432
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
      - ./data/backups:/backups
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
  proxy:
    volumes:
      - ./static:/usr/share/nginx/html:ro

volumes:
  postgres:
